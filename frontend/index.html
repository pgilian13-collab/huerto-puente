<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCSS Huerto Inteligente - Dashboard Industrial</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- SIDEBAR OVERLAY -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <button class="hamburger-btn"><span class="material-icons-round">menu</span></button>
            <div class="header-title-group">
                <h1 class="header-title">SISTEMA DE RIEGO INTELIGENTE</h1>
                <span class="header-subtitle">UNHEVAL - Huerto Universitario</span>
            </div>
        </div>
        <div class="header-center">
            <div class="inv-tabs" id="invTabs"></div>
        </div>
        <div class="header-right">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">CONECTANDO</span>
            </div>
            <div class="live-indicator">
                <div class="live-dot"></div>
                LIVE
            </div>
        </div>
    </header>

    <!-- LOADER -->
    <div class="loader-overlay" id="loader">
        <div class="loader">
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box3"></div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <!-- VIEW: DASHBOARD -->
        <section class="app-view" id="view-dashboard"></section>

        <!-- VIEW: TABLA -->
        <section class="app-view" id="view-tabla"></section>

        <!-- VIEW: GRAFICOS -->
        <section class="app-view" id="view-graficos"></section>

        <!-- VIEW: REPORTES -->
        <section class="app-view" id="view-reportes"></section>

        <!-- VIEW: JUEGO -->
        <section class="app-view" id="view-juego"></section>

        <!-- VIEW: CONFIG -->
        <section class="app-view" id="view-config"></section>
    </main>

    <!-- MODALS -->
    <div class="modal-overlay" id="sensorModal">
        <div class="modal-box modal-large">
            <div class="modal-header">
                <span class="material-icons-round" id="sensorModalIcon">sensors</span>
                <span id="sensorModalTitle">Detalle Sensor</span>
                <button class="modal-close" id="sensorModalClose"><span class="material-icons-round">close</span></button>
            </div>
            <div class="sensor-modal-tabs">
                <div class="sensor-tab active" id="sensorTabGrafico" onclick="EventBus.emit('sensor-modal:view', 'grafico')"><span class="material-icons-round">timeline</span> Grafico</div>
                <div class="sensor-tab" id="sensorTabTabla" onclick="EventBus.emit('sensor-modal:view', 'tabla')"><span class="material-icons-round">table_chart</span> Tabla</div>
            </div>
            <div class="sensor-modal-body">
                <div id="sensorGraficoView"><div class="sensor-chart-container"><canvas id="sensorChart"></canvas></div></div>
                <div id="sensorTablaView" style="display:none"><div class="data-table-container"><table class="data-table"><thead><tr><th>Fecha</th><th>Valor</th></tr></thead><tbody id="sensorTablaBody"></tbody></table></div></div>
            </div>
            <div class="sensor-modal-footer" id="sensorStats"></div>
        </div>
    </div>

    <!-- CORE -->
    <script src="src/core/eventBus.js"></script>
    <script src="src/core/state.js"></script>
    <script src="src/core/router.js"></script>
    <script src="src/core/moduleLoader.js"></script>
    <script src="src/services/api.js"></script>
    <script src="src/services/sensorService.js"></script>
    <script src="src/services/actuatorService.js"></script>

    <!-- COMPONENTS -->
    <script src="src/components/sidebar/sidebar.js"></script>

    <!-- APP -->
    <script src="src/core/app.js"></script>

    <!-- BOOT -->
    <script>
        ModuleLoader.setBase('');
        SidebarComponent.init();
        App.init();
    </script>
</body>
</html>
