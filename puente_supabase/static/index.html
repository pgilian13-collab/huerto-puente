<!DOCTYPE html><html lang="es"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>CCSS Huerto Inteligente - Dashboard Industrial</title>    <link rel="icon" type="image/png" href="favicon.png">    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.js"></script>    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>    <link rel="stylesheet" href="css/styles.css?v=13"></head><body>    <!-- PARTICLES BACKGROUND -->    <div class="stars-container">        <canvas id="particleCanvas"></canvas>    </div>    <!-- SIDEBAR OVERLAY -->    <div class="sidebar-overlay" id="sidebarOverlay"></div>    <!-- SIDEBAR -->    <aside class="sidebar" id="sidebar"></aside>    <!-- HEADER -->    <header class="header">        <div class="header-left">            <img class="logo-img" src="https://www.unheval.edu.pe/portal/public/imagenes/unh/logounh-324x84-1-300x78.png" alt="UNHEVAL">            <div class="header-title-group">                <h1 class="header-title">SISTEMA DE RIEGO INTELIGENTE</h1>                <span class="header-subtitle">UNHEVAL - Huerto Universitario</span>            </div>        </div>        <div class="header-right">            <div class="status-indicator">                <div class="status-dot" id="statusDot"></div>                <span id="statusText">CONECTANDO</span>            </div>            <div class="live-indicator" id="liveIndicator">                <div class="live-dot" id="liveDot"></div>                <span id="liveText">LIVE</span>            </div>        </div>    </header>    <!-- MENU TOGGLE -->    <button class="menu-toggle" id="menuToggle"><span class="material-icons-round">menu</span></button>    <!-- LOADER -->    <div class="loader-overlay" id="loader">        <div class="loader">            <div class="box1"></div>            <div class="box2"></div>            <div class="box3"></div>        </div>    </div>    <!-- MAIN CONTENT -->    <main class="main-content">        <!-- VIEW: DASHBOARD -->        <section class="app-view" id="view-dashboard"></section>        <!-- VIEW: TABLA -->        <section class="app-view" id="view-tabla"></section>        <!-- VIEW: REPORTES -->        <section class="app-view" id="view-reportes"></section>        <!-- VIEW: JUEGO -->        <section class="app-view" id="view-juego"></section>        <!-- VIEW: CONFIG -->        <section class="app-view" id="view-config"></section>    </main>    <!-- MODALS -->    <div class="modal-overlay" id="sensorModal">        <div class="modal-box modal-large">            <div class="modal-header">                <span class="material-icons-round" id="sensorModalIcon">sensors</span>                <span id="sensorModalTitle">Detalle Sensor</span>                <button class="modal-close" id="sensorModalClose"><span class="material-icons-round">close</span></button>            </div>            <div class="sensor-modal-tabs">                <div class="sensor-tab active" id="sensorTabGrafico" onclick="EventBus.emit('sensor-modal:view', 'grafico')"><span class="material-icons-round">timeline</span> Grafico</div>                <div class="sensor-tab" id="sensorTabTabla" onclick="EventBus.emit('sensor-modal:view', 'tabla')"><span class="material-icons-round">table_chart</span> Tabla</div>            </div>            <div class="sensor-modal-body">                <div id="sensorGraficoView"><div class="sensor-chart-container"><canvas id="sensorChart"></canvas></div></div>                <div id="sensorTablaView" style="display:none"><div class="data-table-container"><table class="data-table"><thead><tr><th>Fecha</th><th>Valor</th></tr></thead><tbody id="sensorTablaBody"></tbody></table></div></div>            </div>            <div class="sensor-modal-footer" id="sensorStats"></div>        </div>    </div>    <!-- CONFIG MODAL -->    <div class="modal-overlay" id="configModal">        <div class="modal-box modal-large">            <div class="modal-header">                <span class="material-icons-round">tune</span>                <h3 id="configModalTitle">Configuracion</h3>                <button class="modal-close" onclick="document.getElementById('configModal').classList.remove('active')"><span class="material-icons-round">close</span></button>            </div>            <div class="modal-body" id="configModalBody">                <!-- Plant selector -->                <div class="plant-selector-section" id="plantSelectorSection">                    <label class="config-label"><span class="material-icons-round">eco</span> Planta</label>                    <div class="plant-selector-wrap">                        <input type="text" id="plantSearchInput" class="plant-search-input" placeholder="Buscar planta...">                        <div class="plant-dropdown" id="plantDropdown"></div>                    </div>
                    <div class="plant-badge" id="plantBadge" style="display:none">
                        <span id="plantBadgeName"></span>
                        <button class="plant-badge-remove" id="plantBadgeRemove"><span class="material-icons-round">close</span></button>
                    </div>
                    <div class="plant-actions">
                        <button class="brutalist-btn btn-plant-action" id="btnAddPlant">
                            <span class="material-icons-round">add_circle</span>
                            <span class="btn-label">Agregar Planta</span>
                        </button>
                        <button class="brutalist-btn btn-plant-action" id="btnShowRecommendations">
                            <span class="material-icons-round">lightbulb</span>
                            <span class="btn-label">Recomendaciones</span>
                        </button>
                    </div>
                </div>                <!-- Plant recommendations -->                <div class="plant-recommendations" id="plantRecommendations" style="display:none">                    <div class="plant-rec-header"><span class="material-icons-round">lightbulb</span> Recomendaciones</div>                    <div class="plant-rec-list" id="plantRecList"></div>                </div>                <!-- Threshold inputs will be injected by config module -->                <div id="configThresholdInputs"></div>            </div>            <div class="modal-footer">                <button class="btn-save-config" id="btnSaveConfig"><span class="material-icons-round">save</span> Guardar</button>            </div>
        </div>
    </div>
    <!-- MODAL: AGREGAR PLANTA -->
    <div class="modal-overlay" id="addPlantModal">
        <div class="modal-box">
            <div class="modal-header">
                <span class="material-icons-round">add_circle</span>
                <h3>Agregar Nueva Planta</h3>
                <button class="modal-close" id="addPlantModalClose"><span class="material-icons-round">close</span></button>
            </div>
            <div class="modal-body">
                <form id="addPlantForm" class="add-plant-form" onsubmit="return false;">
                    <div class="form-row">
                        <label class="config-label">Nombre <span class="required">*</span></label>
                        <input type="text" id="np-nombre" class="form-input" placeholder="Ej: Albahaca" required>
                    </div>
                    <div class="form-row form-grid-2">
                        <div>
                            <label class="config-label">Temp. Min (°C)</label>
                            <input type="number" id="np-temp-min" class="form-input" step="0.1" placeholder="15">
                        </div>
                        <div>
                            <label class="config-label">Temp. Max (°C)</label>
                            <input type="number" id="np-temp-max" class="form-input" step="0.1" placeholder="30">
                        </div>
                    </div>
                    <div class="form-row form-grid-2">
                        <div>
                            <label class="config-label">Hum. Suelo Min (%)</label>
                            <input type="number" id="np-hs-min" class="form-input" step="0.1" placeholder="40">
                        </div>
                        <div>
                            <label class="config-label">Hum. Suelo Max (%)</label>
                            <input type="number" id="np-hs-max" class="form-input" step="0.1" placeholder="80">
                        </div>
                    </div>
                    <div class="form-row form-grid-2">
                        <div>
                            <label class="config-label">Hum. Amb. Min (%)</label>
                            <input type="number" id="np-ha-min" class="form-input" step="0.1" placeholder="30">
                        </div>
                        <div>
                            <label class="config-label">Hum. Amb. Max (%)</label>
                            <input type="number" id="np-ha-max" class="form-input" step="0.1" placeholder="85">
                        </div>
                    </div>
                    <div class="form-row form-grid-2">
                        <div>
                            <label class="config-label">pH Min</label>
                            <input type="number" id="np-ph-min" class="form-input" step="0.1" placeholder="5.5">
                        </div>
                        <div>
                            <label class="config-label">pH Max</label>
                            <input type="number" id="np-ph-max" class="form-input" step="0.1" placeholder="7.5">
                        </div>
                    </div>
                    <div class="form-error" id="addPlantError" style="display:none"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="brutalist-btn btn-secondary" id="btnCancelAddPlant">
                    <span class="material-icons-round">close</span>
                    <span class="btn-label">Cancelar</span>
                </button>
                <button class="btn-save-config" id="btnSaveNewPlant">
                    <span class="material-icons-round">save</span>
                    <span class="btn-label">Guardar Planta</span>
                </button>
            </div>
        </div>
    </div>
    <!-- MODAL: RECOMENDACIONES DE PLANTAS -->
    <div class="modal-overlay" id="recPlantModal">
        <div class="modal-box modal-large">
            <div class="modal-header">
                <span class="material-icons-round">lightbulb</span>
                <h3>Plantas Recomendadas</h3>
                <button class="modal-close" id="recPlantModalClose"><span class="material-icons-round">close</span></button>
            </div>
            <div class="modal-body">
                <div class="rec-info" id="recInfo"></div>
                <div class="plant-rec-list plant-rec-list-modal" id="recPlantList"></div>
            </div>
        </div>
    </div>
    <!-- CORE -->    <script src="js/config.js?v=13"></script>    <script src="src/core/eventBus.js?v=13"></script>    <script src="src/core/state.js?v=13"></script>    <script src="src/core/router.js?v=13"></script>    <script src="src/core/moduleLoader.js?v=13"></script>    <script src="src/services/api.js?v=13"></script>    <script src="src/services/sensorService.js?v=13"></script>    <script src="src/services/actuatorService.js?v=13"></script>    <!-- COMPONENTS -->    <script src="src/components/sidebar/sidebar.js?v=13"></script>    <!-- APP -->    <script src="src/core/app.js?v=13"></script>    <!-- BOOT -->    <script>        ModuleLoader.setBase('');        SidebarComponent.init();        App.init();    </script></body></html>
